index.html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCT Multi-Planner & Ops Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #f97316;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

<div id="app" class="flex flex-col md:flex-row min-h-screen">
    <!-- Sidebar -->
    <aside class="w-full md:w-80 bg-white border-r border-slate-200 p-6 flex flex-col h-auto md:h-screen sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-2 mb-8">
            <i data-lucide="activity" class="text-orange-500 w-7 h-7"></i>
            <h1 class="text-xl font-black text-slate-800 tracking-tight">GCT Multi-Planner</h1>
        </div>

        <!-- Navigation -->
        <nav class="mb-8 p-1 bg-slate-100 rounded-2xl flex">
            <button onclick="setView('planner')" id="nav-planner" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold transition-all bg-white text-blue-600 shadow-sm">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Planner
            </button>
            <button onclick="setView('table')" id="nav-table" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-slate-700">
                <i data-lucide="list" class="w-4 h-4"></i> Ops Table
            </button>
        </nav>

        <div id="sidebar-actions">
            <button onclick="addVessel()" class="w-full mb-6 bg-slate-900 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-800 transition-all shadow-lg">
                <i data-lucide="plus" class="w-5 h-5"></i> Add New Vessel
            </button>

            <div id="vessel-list" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar max-h-[50vh] md:max-h-none">
                <!-- Vessels injected here -->
            </div>
        </div>

        <div id="table-sidebar-note" class="hidden mt-auto pt-6 border-t border-slate-100">
            <div class="bg-blue-600 p-4 rounded-2xl text-white text-xs">
                <p class="font-bold mb-1 flex items-center gap-1"><i data-lucide="info" class="w-3.5 h-3.5"></i> Table Mode</p>
                <p class="opacity-80">Compare planned targets with actual crane performance across all vessels.</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 overflow-y-auto h-screen relative p-4 md:p-10">
        <!-- Views injected here -->
    </main>
</div>

<script>
    // Configuration
    const EQUIPMENT_TYPES = [
        { value: 'LHM600#08', label: 'LHM600 #08', defaultCbm: 15, defaultSec: 133 },
        { value: 'LHM600#09', label: 'LHM600 #09', defaultCbm: 15, defaultSec: 133 },
        { value: 'LHM180#07', label: 'LHM180 #07', defaultCbm: 8, defaultSec: 150 },
        { value: 'Gottwald#05', label: 'Gottwald #05', defaultCbm: 12, defaultSec: 144 },
        { value: 'Gottwald#06', label: 'Gottwald #06', defaultCbm: 12, defaultSec: 144 },
        { value: 'MSL#01', label: 'MSL #01', defaultCbm: 10, defaultSec: 163 },
        { value: 'MSL#02', label: 'MSL #02', defaultCbm: 10, defaultSec: 163 },
        { value: 'ShipCranes', label: 'Ship Cranes', defaultCbm: 8, defaultSec: 180 },
    ];

    // State Management
    let currentView = 'planner';
    let vessels = [
        {
            id: 1,
            name: 'Vessel Alpha',
            rotationNo: 'ROT-2024-001',
            berthNo: 'B-04',
            target: 75000,
            firstLiftDate: new Date().toISOString().split('T')[0],
            firstLiftTime: '08:00',
            density: 1.3,
            efficiency: 85,
            shiftHours: 12,
            actualTph: 0,
            actualCycleTime: 0,
            actualWorkingHrs: 0,
            idleTime: 0,
            cranes: [
                { id: 101, model: 'LHM600#08', cbm: 15, count: 1, targetTph: 736 },
                { id: 102, model: 'ShipCranes', cbm: 8, count: 4, targetTph: 800 },
            ]
        }
    ];
    let activeVesselId = 1;

    // UI Helpers
    function setView(view) {
        currentView = view;
        document.getElementById('nav-planner').className = `flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold transition-all ${view === 'planner' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`;
        document.getElementById('nav-table').className = `flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold transition-all ${view === 'table' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`;
        
        document.getElementById('sidebar-actions').style.display = view === 'planner' ? 'block' : 'none';
        document.getElementById('table-sidebar-note').style.display = view === 'table' ? 'block' : 'none';
        
        render();
    }

    function addVessel() {
        const newId = Date.now();
        vessels.push({
            id: newId,
            name: `New Vessel ${vessels.length + 1}`,
            rotationNo: `ROT-${vessels.length + 1}`,
            berthNo: 'N/A',
            target: 50000,
            firstLiftDate: new Date().toISOString().split('T')[0],
            firstLiftTime: '08:00',
            density: 1.3,
            efficiency: 85,
            shiftHours: 12,
            actualTph: 0,
            actualCycleTime: 0,
            actualWorkingHrs: 0,
            idleTime: 0,
            cranes: [{ id: Date.now() + 1, model: 'LHM600#08', cbm: 15, count: 1, targetTph: 500 }]
        });
        activeVesselId = newId;
        render();
    }

    function removeVessel(id) {
        if (vessels.length <= 1) return;
        vessels = vessels.filter(v => v.id !== id);
        if (activeVesselId === id) activeVesselId = vessels[0].id;
        render();
    }

    function updateVessel(id, field, value) {
        const vessel = vessels.find(v => v.id === id);
        if (vessel) {
            vessel[field] = (field === 'target' || field === 'density' || field === 'efficiency' || field === 'shiftHours' || field === 'actualTph' || field === 'actualCycleTime' || field === 'actualWorkingHrs' || field === 'idleTime') ? Number(value) : value;
            render();
        }
    }

    function addCraneSet(vesselId) {
        const vessel = vessels.find(v => v.id === vesselId);
        if (vessel) {
            vessel.cranes.push({ id: Date.now(), model: 'LHM600#08', cbm: 15, count: 1, targetTph: 500 });
            render();
        }
    }

    function removeCrane(vesselId, craneId) {
        const vessel = vessels.find(v => v.id === vesselId);
        if (vessel) {
            vessel.cranes = vessel.cranes.filter(c => c.id !== craneId);
            render();
        }
    }

    function updateCrane(vesselId, craneId, field, value) {
        const vessel = vessels.find(v => v.id === vesselId);
        if (vessel) {
            const crane = vessel.cranes.find(c => c.id === craneId);
            if (crane) {
                if (field === 'model') {
                    const info = EQUIPMENT_TYPES.find(e => e.value === value);
                    crane.model = value;
                    crane.cbm = info.defaultCbm;
                } else {
                    crane[field] = Number(value);
                }
                render();
            }
        }
    }

    // Calculations
    function getVesselData(v) {
        const craneDetails = v.cranes.map(c => {
            const cycleTon = c.cbm * v.density;
            const requiredCycleTime = (c.targetTph > 0 && c.count > 0)
                ? (cycleTon * 3600 * (v.efficiency / 100)) / (c.targetTph / c.count)
                : 0;
            return { ...c, cycleTon, requiredCycleTime };
        });

        const totalTargetTph = craneDetails.reduce((acc, curr) => acc + curr.targetTph, 0);
        const totalHoursNeeded = totalTargetTph > 0 ? v.target / totalTargetTph : 0;
        
        const startDateTime = new Date(`${v.firstLiftDate}T${v.firstLiftTime}`);
        const isValidDate = !isNaN(startDateTime.getTime());
        const finishDateTime = isValidDate ? new Date(startDateTime.getTime() + totalHoursNeeded * 60 * 60 * 1000) : null;
        
        const equipmentsStr = v.cranes.map(c => `${c.count}x ${c.model}`).join(', ');
        const productiveHrs = Math.max(0, v.actualWorkingHrs - v.idleTime);

        return {
            ...v,
            craneDetails,
            totalTargetTph,
            totalHoursNeeded,
            finishDateTime,
            equipmentsStr,
            productiveHrs,
            isValidDate
        };
    }

    function render() {
        const main = document.getElementById('main-content');
        const vesselList = document.getElementById('vessel-list');
        const calculatedVessels = vessels.map(getVesselData);
        
        // Render Sidebar List
        vesselList.innerHTML = calculatedVessels.map(v => `
            <div onclick="activeVesselId = ${v.id}; render();" class="p-4 rounded-2xl cursor-pointer transition-all border-2 group ${activeVesselId === v.id ? 'border-blue-500 bg-blue-50' : 'border-transparent bg-slate-50 hover:bg-slate-100'}">
                <div class="flex justify-between items-start mb-1">
                    <span class="font-black text-sm uppercase truncate pr-2 ${activeVesselId === v.id ? 'text-blue-700' : 'text-slate-600'}">${v.name}</span>
                    <button onclick="event.stopPropagation(); removeVessel(${v.id})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                </div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex justify-between">
                    <span>${v.totalHoursNeeded.toFixed(1)} Hours</span>
                    <span class="text-blue-500">${(v.target/1000).toFixed(0)}k MT</span>
                </div>
            </div>
        `).join('');

        if (currentView === 'planner') {
            const v = calculatedVessels.find(v => v.id === activeVesselId);
            if (!v) {
                main.innerHTML = `<div class="h-full flex items-center justify-center text-slate-300 uppercase font-black text-xl">Select a vessel</div>`;
            } else {
                main.innerHTML = `
                <div class="max-w-5xl mx-auto animate-in fade-in duration-500">
                    <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-200 mb-8 flex flex-col lg:flex-row justify-between gap-8">
                        <div class="flex-1">
                            <input onchange="updateVessel(${v.id}, 'name', this.value)" class="text-4xl font-black text-slate-800 focus:outline-none bg-transparent w-full border-b border-transparent focus:border-slate-100 mb-2" value="${v.name}" />
                            <div class="flex flex-wrap gap-3 items-center text-[10px] font-bold uppercase tracking-widest">
                                <span class="bg-slate-800 px-3 py-1.5 rounded-full text-white">Rotation: ${v.rotationNo}</span>
                                <span class="bg-orange-100 px-3 py-1.5 rounded-full text-orange-600">Berth: ${v.berthNo}</span>
                                <span class="bg-blue-50 px-3 py-1.5 rounded-full text-blue-600">First Lift: ${v.firstLiftDate}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 text-center">
                            <div class="p-4 bg-slate-900 rounded-3xl text-white min-w-[140px]">
                                <div class="text-3xl font-black text-orange-400">${v.totalHoursNeeded.toFixed(1)}</div>
                                <div class="text-[9px] uppercase opacity-50">Stay (Hours)</div>
                            </div>
                            <div class="p-4 bg-blue-600 rounded-3xl text-white min-w-[140px]">
                                <div class="text-3xl font-black">${(v.totalHoursNeeded/24).toFixed(1)}</div>
                                <div class="text-[9px] uppercase opacity-50">Stay (Days)</div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-8 space-y-6">
                            <div class="bg-white p-6 rounded-3xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-6 shadow-sm">
                                <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Rotation Number</label><input type="text" onchange="updateVessel(${v.id}, 'rotationNo', this.value)" class="w-full text-lg font-bold border-b border-slate-100 outline-none" value="${v.rotationNo}" /></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Berth Number</label><input type="text" onchange="updateVessel(${v.id}, 'berthNo', this.value)" class="w-full text-lg font-bold border-b border-slate-100 outline-none" value="${v.berthNo}" /></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Total Quantity (MT)</label><input type="number" onchange="updateVessel(${v.id}, 'target', this.value)" class="w-full text-lg font-bold border-b border-slate-100 outline-none" value="${v.target}" /></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1">First Lift Date</label><input type="date" onchange="updateVessel(${v.id}, 'firstLiftDate', this.value)" class="w-full text-xs font-bold border-b border-slate-100 outline-none" value="${v.firstLiftDate}" /></div>
                            </div>

                            <div class="flex justify-between items-center px-2">
                                <h3 class="font-black text-slate-400 uppercase text-xs tracking-widest">Equipment Setup</h3>
                                <button onclick="addCraneSet(${v.id})" class="text-blue-600 font-bold text-xs flex items-center gap-1"><i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Crane</button>
                            </div>

                            <div class="space-y-4">
                                ${v.craneDetails.map(c => `
                                    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row">
                                        <div class="p-6 md:w-1/3 bg-slate-50 border-r border-slate-100 relative">
                                            <div class="flex gap-2 mb-4">
                                                <select onchange="updateCrane(${v.id}, ${c.id}, 'model', this.value)" class="bg-white font-black text-slate-800 p-2 rounded-xl border border-slate-200 outline-none text-xs flex-1 truncate">
                                                    ${EQUIPMENT_TYPES.map(type => `<option value="${type.value}" ${c.model === type.value ? 'selected' : ''}>${type.label}</option>`).join('')}
                                                </select>
                                                <button onclick="removeCrane(${v.id}, ${c.id})" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </div>
                                            <div class="grid grid-cols-2 gap-3">
                                                <div><label class="text-[8px] font-bold text-slate-400 block mb-1 uppercase">Units</label><input type="number" onchange="updateCrane(${v.id}, ${c.id}, 'count', this.value)" class="w-full bg-white font-bold p-2 rounded-xl border border-slate-100 text-sm" value="${c.count}" /></div>
                                                <div><label class="text-[8px] font-bold text-slate-400 block mb-1 uppercase">CBM</label><input type="number" onchange="updateCrane(${v.id}, ${c.id}, 'cbm', this.value)" class="w-full bg-white font-bold p-2 rounded-xl border border-slate-100 text-sm" value="${c.cbm}" /></div>
                                            </div>
                                        </div>
                                        <div class="p-6 flex-1 flex flex-col justify-center">
                                            <div class="flex justify-between items-center mb-2">
                                                <span class="text-[10px] font-bold text-blue-600 uppercase">Target Net TPH</span>
                                                <div class="flex items-center gap-2">
                                                    <input type="number" onchange="updateCrane(${v.id}, ${c.id}, 'targetTph', this.value)" class="text-2xl font-black w-24 border-b border-blue-100 outline-none text-right" value="${c.targetTph}" />
                                                    <span class="text-xs font-bold text-blue-300">TPH</span>
                                                </div>
                                            </div>
                                            <div class="flex justify-between text-[10px] text-slate-400 font-bold uppercase mt-2 italic">
                                                <span>Req. Cycle: <span class="text-orange-600">${c.requiredCycleTime.toFixed(0)}s</span></span>
                                                <span>Payload: ${c.cycleTon.toFixed(1)} MT</span>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="lg:col-span-4 space-y-6">
                            <div class="bg-slate-900 p-8 rounded-[40px] text-white shadow-xl relative overflow-hidden">
                                <h3 class="font-black text-slate-500 uppercase text-[10px] tracking-widest mb-6">Planned Timeline</h3>
                                <div class="mb-8">
                                    <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Estimated Finish</div>
                                    <div class="text-2xl font-black">${v.finishDateTime ? v.finishDateTime.toLocaleDateString() : '--'}</div>
                                    <div class="text-4xl font-black text-orange-400">${v.finishDateTime ? v.finishDateTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--'}</div>
                                </div>
                                <div class="pt-6 border-t border-slate-800">
                                    <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">Shift Target (${v.shiftHours}h)</div>
                                    <div class="text-2xl font-black text-blue-500">${(v.totalTargetTph * v.shiftHours).toLocaleString()} <span class="text-sm font-normal text-slate-600">MT</span></div>
                                </div>
                                <i data-lucide="ship" class="absolute -bottom-10 -right-10 text-slate-800 opacity-20 w-48 h-48"></i>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
        } else {
            // Table View
            main.innerHTML = `
            <div class="animate-in slide-in-from-right duration-500">
                <div class="bg-white rounded-[40px] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-8 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <div><h2 class="text-2xl font-black text-slate-800 tracking-tight">Ops Performance Tracking</h2></div>
                        <div class="px-4 py-2 bg-blue-100 text-blue-700 rounded-xl text-xs font-black uppercase">Active: ${calculatedVessels.length}</div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest">
                                    <th class="p-5">Vessel / Rotation</th>
                                    <th class="p-5">Berth</th>
                                    <th class="p-5">Equipments</th>
                                    <th class="p-5 border-l border-slate-800 bg-blue-900/50">Req TPH</th>
                                    <th class="p-5 bg-blue-900/50">Actual TPH</th>
                                    <th class="p-5 border-l border-slate-800 bg-orange-900/50">Req Cycle</th>
                                    <th class="p-5 bg-orange-900/50">Actual Cycle</th>
                                    <th class="p-5 border-l border-slate-800 bg-slate-800">Working / Idle</th>
                                    <th class="p-5 bg-slate-800">Productive Hrs</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${calculatedVessels.map(v => `
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="p-5">
                                            <div class="font-black text-slate-800 uppercase">${v.name}</div>
                                            <div class="text-[10px] text-slate-400 font-bold">${v.rotationNo}</div>
                                        </td>
                                        <td class="p-5"><span class="px-3 py-1 bg-orange-50 text-orange-600 rounded-full font-black text-[10px]">${v.berthNo}</span></td>
                                        <td class="p-5 max-w-[150px] text-[10px] text-slate-400 font-medium truncate" title="${v.equipmentsStr}">${v.equipmentsStr}</td>
                                        <td class="p-5 border-l border-slate-100 font-black text-blue-600 bg-blue-50/10">${v.totalTargetTph}</td>
                                        <td class="p-5 bg-blue-50/10">
                                            <div class="flex items-center gap-1 border-b border-blue-100"><input type="number" onchange="updateVessel(${v.id}, 'actualTph', this.value)" class="bg-transparent font-black w-14 outline-none" value="${v.actualTph || ''}" /><i data-lucide="edit-3" class="w-3 h-3 text-blue-300"></i></div>
                                        </td>
                                        <td class="p-5 border-l border-slate-100 font-black text-orange-600 bg-orange-50/10">${(v.craneDetails.reduce((a, b) => a + b.requiredCycleTime, 0) / (v.craneDetails.length || 1)).toFixed(0)}s</td>
                                        <td class="p-5 bg-orange-50/10">
                                            <div class="flex items-center gap-1 border-b border-orange-100"><input type="number" onchange="updateVessel(${v.id}, 'actualCycleTime', this.value)" class="bg-transparent font-black w-14 outline-none" value="${v.actualCycleTime || ''}" /><i data-lucide="edit-3" class="w-3 h-3 text-orange-300"></i></div>
                                        </td>
                                        <td class="p-5 border-l border-slate-100 bg-slate-50/30">
                                            <div class="flex gap-3">
                                                <div class="flex flex-col"><span class="text-[8px] uppercase opacity-50 font-bold">W</span><input type="number" onchange="updateVessel(${v.id}, 'actualWorkingHrs', this.value)" class="w-8 font-bold border-b bg-transparent outline-none" value="${v.actualWorkingHrs || ''}" /></div>
                                                <div class="flex flex-col text-red-500"><span class="text-[8px] uppercase opacity-50 font-bold">I</span><input type="number" onchange="updateVessel(${v.id}, 'idleTime', this.value)" class="w-8 font-bold border-b border-red-100 bg-transparent outline-none" value="${v.idleTime || ''}" /></div>
                                            </div>
                                        </td>
                                        <td class="p-5 bg-slate-50/30 font-black text-slate-800 text-lg">${v.productiveHrs.toFixed(1)} <span class="text-[8px] uppercase text-slate-400">Net</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div class="bg-blue-100 p-3 rounded-2xl text-blue-600"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></div>
                        <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fleet Actual TPH</div><div class="text-2xl font-black">${calculatedVessels.reduce((a,b)=>a + b.actualTph, 0)}</div></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div class="bg-orange-100 p-3 rounded-2xl text-orange-600"><i data-lucide="clock" class="w-6 h-6"></i></div>
                        <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Productive</div><div class="text-2xl font-black">${calculatedVessels.reduce((a,b)=>a + b.productiveHrs, 0).toFixed(1)}h</div></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-4 text-red-600">
                        <div class="bg-red-50 p-3 rounded-2xl text-red-500"><i data-lucide="alert-circle" class="w-6 h-6"></i></div>
                        <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Fleet Idle</div><div class="text-2xl font-black">${calculatedVessels.reduce((a,b)=>a + b.idleTime, 0).toFixed(1)}h</div></div>
                    </div>
                </div>
            </div>`;
        }
        
        lucide.createIcons();
    }

    // Initial Render
    window.onload = render;
</script>

</body>
</html>
